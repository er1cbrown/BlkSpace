name: Release

on:
  push:
    tags:
      - "v*"

env:
  PNPM_VERSION: 9
  NODE_VERSION: 22

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - id: create-release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: BlkSpace ${{ github.ref_name }}

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: AppImage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: msi
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm build:tier0
        working-directory: ./Code-Companion/artifacts/blkspace
      - run: pnpm tauri build --target ${{ matrix.target }} -- --no-default-features
        working-directory: ./Code-Companion/artifacts/blkspace
      - name: Rename Yard release artifacts
        shell: bash
        run: |
          BUNDLE="Code-Companion/artifacts/blkspace/src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ "${{ matrix.ext }}" = "msi" ]; then
            cp "$BUNDLE/msi"/*.msi "$BUNDLE/msi/BlkSpace-Yard-Windows-x64.msi"
          elif [ "${{ matrix.ext }}" = "dmg" ]; then
            cp "$BUNDLE/dmg"/*.dmg "$BUNDLE/dmg/BlkSpace-Yard-macOS.dmg"
          elif [ "${{ matrix.ext }}" = "AppImage" ]; then
            cp "$BUNDLE/appimage"/*.AppImage "$BUNDLE/appimage/BlkSpace-Yard-Linux.AppImage"
          fi
      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Code-Companion/artifacts/blkspace/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.ext }}/BlkSpace-Yard-*
          tag_name: ${{ github.ref_name }}
