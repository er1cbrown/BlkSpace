name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".editorconfig"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".editorconfig"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9
  NODE_VERSION: 22
  RUST_TOOLCHAIN: stable
  PORT: "24442"
  BASE_PATH: /

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm lint
        working-directory: ./Code-Companion
      - run: pnpm format:check
        working-directory: ./Code-Companion

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm typecheck
        working-directory: ./Code-Companion

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm test
        working-directory: ./Code-Companion

  test-tauri-rust:
    name: Rust unit tests (Tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib -- --skip nostr_relay_smoke
        working-directory: ./Code-Companion/artifacts/blkspace

  test-nostr-relay:
    name: Nostr relay smoke (live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path src-tauri/Cargo.toml nostr_relay_smoke -- --test-threads=1
        working-directory: ./Code-Companion/artifacts/blkspace

  build-web:
    name: Build (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm build
        working-directory: ./Code-Companion

  e2e:
    name: E2E (Playwright web preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run build
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:install
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:browser
        working-directory: ./Code-Companion

  e2e-tauri:
    name: E2E (Playwright Tauri native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev \
            xvfb
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:install
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:tauri
        working-directory: ./Code-Companion
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-playwright-report
          path: Code-Companion/artifacts/blkspace/playwright-report/
          retention-days: 7

  build-tauri:
    name: Build (Tauri - ${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm tauri build
        working-directory: ./Code-Companion/artifacts/blkspace

  build-tauri-iroh:
    name: Build (Tauri + Iroh - Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run test:iroh
        working-directory: ./Code-Companion
      - run: pnpm tauri build -- --features iroh
        working-directory: ./Code-Companion/artifacts/blkspace
