name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".editorconfig"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".editorconfig"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9
  NODE_VERSION: 22
  RUST_TOOLCHAIN: stable
  PORT: "24442"
  BASE_PATH: /

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm lint
        working-directory: ./Code-Companion
      - run: pnpm format:check
        working-directory: ./Code-Companion

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm typecheck
        working-directory: ./Code-Companion

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm test
        working-directory: ./Code-Companion

  test-tauri-rust:
    name: Rust unit tests (Tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib -- --skip nostr_relay_smoke
        working-directory: ./Code-Companion/artifacts/blkspace

  test-anchor-bkspc:
    name: Anchor tests (bkspc program)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/solana run test:anchor
        working-directory: ./Code-Companion

  test-nostr-relay:
    name: Nostr relay smoke (live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path src-tauri/Cargo.toml nostr_relay_smoke -- --test-threads=1
        working-directory: ./Code-Companion/artifacts/blkspace

  bundle-budget-tier0:
    name: Bundle budget (Tier 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm check:bundle:tier0
        working-directory: ./Code-Companion/artifacts/blkspace
        env:
          PORT: "24442"
          BASE_PATH: /

  build-web:
    name: Build (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm build
        working-directory: ./Code-Companion

  e2e:
    name: E2E (Playwright web preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run build
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:install
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:browser
        working-directory: ./Code-Companion

  e2e-tauri:
    name: E2E (Playwright Tauri native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev \
            xvfb
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:install
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run e2e:tauri
        working-directory: ./Code-Companion
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-playwright-report
          path: Code-Companion/artifacts/blkspace/playwright-report/
          retention-days: 7

  build-tauri-full:
    name: Build (BlkSpace Full - ${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm build:full
        working-directory: ./Code-Companion/artifacts/blkspace
      - run: pnpm tauri build
        working-directory: ./Code-Companion/artifacts/blkspace
      - name: Rename Full installers
        shell: bash
        run: |
          BUNDLE="Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle"
          if [ -d "$BUNDLE/msi" ]; then
            shopt -s nullglob
            for f in "$BUNDLE/msi"/*.msi; do
              cp "$f" "$BUNDLE/msi/BlkSpace-Full-Windows-x64.msi"
            done
          fi
          if [ -d "$BUNDLE/dmg" ]; then
            shopt -s nullglob
            for f in "$BUNDLE/dmg"/*.dmg; do
              cp "$f" "$BUNDLE/dmg/BlkSpace-Full-macOS.dmg"
            done
          fi
          if [ -d "$BUNDLE/appimage" ]; then
            shopt -s nullglob
            for f in "$BUNDLE/appimage"/*.AppImage; do
              cp "$f" "$BUNDLE/appimage/BlkSpace-Full-Linux.AppImage"
            done
          fi
      - name: Upload BlkSpace Full artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlkSpace-Full-${{ matrix.os }}
          path: |
            Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle/msi/BlkSpace-Full-Windows-x64.msi
            Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle/dmg/BlkSpace-Full-macOS.dmg
            Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle/appimage/BlkSpace-Full-Linux.AppImage
          if-no-files-found: error

  build-tauri-yard:
    name: Build (BlkSpace Yard - ${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm build:tier0
        working-directory: ./Code-Companion/artifacts/blkspace
      - run: pnpm tauri build -- --no-default-features
        working-directory: ./Code-Companion/artifacts/blkspace
      - name: Rename Yard installers
        shell: bash
        run: |
          BUNDLE="Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle"
          if [ -d "$BUNDLE/msi" ]; then
            shopt -s nullglob
            for f in "$BUNDLE/msi"/*.msi; do
              cp "$f" "$BUNDLE/msi/BlkSpace-Yard-Windows-x64.msi"
            done
          fi
          if [ -d "$BUNDLE/dmg" ]; then
            shopt -s nullglob
            for f in "$BUNDLE/dmg"/*.dmg; do
              cp "$f" "$BUNDLE/dmg/BlkSpace-Yard-macOS.dmg"
            done
          fi
          if [ -d "$BUNDLE/appimage" ]; then
            shopt -s nullglob
            for f in "$BUNDLE/appimage"/*.AppImage; do
              cp "$f" "$BUNDLE/appimage/BlkSpace-Yard-Linux.AppImage"
            done
          fi
      - name: Upload BlkSpace Yard artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlkSpace-Yard-${{ matrix.os }}
          path: |
            Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle/msi/BlkSpace-Yard-Windows-x64.msi
            Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle/dmg/BlkSpace-Yard-macOS.dmg
            Code-Companion/artifacts/blkspace/src-tauri/target/release/bundle/appimage/BlkSpace-Yard-Linux.AppImage
          if-no-files-found: error

  build-tauri-iroh:
    name: Build (Tauri + Iroh - Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsecret-1-dev
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm --filter @workspace/blkspace run test:iroh
        working-directory: ./Code-Companion
      - run: pnpm tauri build -- --features iroh
        working-directory: ./Code-Companion/artifacts/blkspace
