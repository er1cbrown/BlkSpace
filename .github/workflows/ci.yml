name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".editorconfig"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".editorconfig"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9
  NODE_VERSION: 22
  RUST_TOOLCHAIN: stable

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm lint
        working-directory: ./Code-Companion
      - run: pnpm format:check
        working-directory: ./Code-Companion

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm typecheck
        working-directory: ./Code-Companion

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm test
        working-directory: ./Code-Companion

  build-web:
    name: Build (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm build
        working-directory: ./Code-Companion

  build-tauri:
    name: Build (Tauri - ${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: Code-Companion/pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev
      - run: pnpm install --frozen-lockfile
        working-directory: ./Code-Companion
      - run: pnpm tauri build
        working-directory: ./Code-Companion/artifacts/blkspace
