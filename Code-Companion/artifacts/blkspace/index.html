<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>BKSPC — The social network that pays you to post</title>
    <meta name="description" content="BKSPC: social network + creator economy on Solana. Post, earn WeixBucks, cash out to BKSPC. Works on any laptop or phone." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="BKSPC — The social network that pays you to post" />
    <meta property="og:description" content="Post, earn, cash out. BKSPC is the Solana token for a community-owned social network." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bkspc.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BKSPC" />
    <meta name="twitter:description" content="The social network that pays you to post. Earn WeixBucks, cash out to BKSPC on Solana." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="tauri-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-family:sans-serif;z-index:9999;">
      <div style="text-align:center">
        <div style="font-size:24px;margin-bottom:8px;font-weight:800;letter-spacing:-0.05em">BKSPC</div>
        <div style="opacity:0.7">Loading...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function hideLoader() {
        const loader = document.getElementById('tauri-loading');
        if (!loader) return;
        const root = document.getElementById('root');
        let attempts = 0;
        const maxAttempts = 60;
        const check = () => {
          attempts++;
          if (root && root.children.length > 0) {
            loader.style.display = 'none';
            return;
          }
          if (attempts < maxAttempts) setTimeout(check, 500);
        };
        setTimeout(() => {
          if (loader.style.display !== 'none') loader.style.display = 'none';
        }, 45000);
        check();
      })();
      window.addEventListener('error', function(e) {
        const loader = document.getElementById('tauri-loading');
        if (loader) {
          loader.style.background = '#fee';
          loader.style.color = '#900';
          loader.innerHTML = '<div style="padding:20px;font-family:monospace;max-width:90%;margin:0 auto"><h2>JavaScript Error</h2><pre style="white-space:pre-wrap">' + (e.message || e) + '</pre></div>';
          loader.style.display = 'flex';
        }
      });
    </script>
  </body>
</html>
