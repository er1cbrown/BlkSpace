<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>BlkSpace — B.L.A.C.K. / WeixNet</title>
    <meta name="description" content="BlkSpace: a decentralized social platform for HBCU college-town communities. Built by B.L.A.C.K. (Brothers for Love, Achievement, Culture & Knowledge) on WeixNet." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="BlkSpace — B.L.A.C.K. / WeixNet" />
    <meta property="og:description" content="A decentralized social platform for HBCU college-town communities. Built by B.L.A.C.K." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BlkSpace" />
    <meta name="twitter:description" content="BlkSpace — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- Visible fallback while React loads (helps debug white screen) -->
    <div id="tauri-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-family:sans-serif;z-index:9999;">
      <div style="text-align:center">
        <div style="font-size:24px;margin-bottom:8px">BlkSpace</div>
        <div style="opacity:0.7">Loading Tauri webview... (check DevTools if stuck)</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide the fallback once React mounts (or after timeout)
      setTimeout(() => {
        const el = document.getElementById('tauri-loading');
        if (el) el.style.display = 'none';
      }, 8000);
    </script>
  </body>
</html>
